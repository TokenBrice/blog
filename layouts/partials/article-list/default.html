{{- $page := . -}}
{{ $image := partialCached "helper/image" (dict "Context" $page "Type" "articleList") $page.RelPermalink "articleList" }}
<article class="{{ if $image.exists }}has-image{{ end }}">
    {{ partialCached "article/components/header" (dict "context" $page "isSummary" true) (printf "%s|summary" $page.RelPermalink) }}
</article>
