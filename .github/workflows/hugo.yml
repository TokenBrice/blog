name: Deploy Hugo site to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.1'
          extended: true

      - name: Install Dart Sass
        run: sudo snap install dart-sass

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Cache Hugo resources
        uses: actions/cache@v4
        with:
          path: |
            resources/_gen
            ~/.cache/hugo_cache
          key: hugo-${{ hashFiles('assets/**', 'themes/**', 'hugo.yaml') }}
          restore-keys: hugo-

      - name: Validate post front-matter
        run: npm run validate:frontmatter

      - name: Validate content safety
        run: npm run validate:content

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Generate missing WebP images
        run: |
          sudo apt-get install -y -qq webp
          find static/img -type f \( -iname '*.png' -o -iname '*.jpg' -o -iname '*.jpeg' \) | while read src; do
            webp="${src%.*}.webp"
            if [ ! -f "$webp" ]; then
              echo "Generating $webp"
              cwebp -q 80 "$src" -o "$webp"
            fi
          done

      - name: Install AVIF encoder
        run: sudo apt-get install -y libavif-bin || (sudo apt-get update && sudo apt-get install -y libavif-bin)

      - name: Generate missing AVIF siblings
        run: |
          failed=0
          while IFS= read -r -d '' f; do
            out="${f%.*}.avif"
            if [[ ! -f "$out" ]]; then
              if ! avifenc --min 25 --max 35 --speed 6 "$f" "$out"; then
                echo "AVIF generation failed: $f"
                failed=1
              fi
            fi
          done < <(find static/img -type f \( -iname '*.png' -o -iname '*.jpg' -o -iname '*.jpeg' \) -print0)
          exit "$failed"

      - name: Verify ImageMagick and jq installed
        run: |
          which identify || sudo apt-get install -y imagemagick
          which jq || sudo apt-get install -y jq

      - name: Generate image dimensions manifest
        run: bash scripts/gen-img-dims.sh

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
        run: hugo --gc --minify

      - name: Validate generated site output
        run: npm run validate:site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
