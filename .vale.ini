# Vale prose linter — local-use config (not wired into CI).
# Install: https://vale.sh/docs/vale-cli/installation/
# Sync packages: `vale sync`
# Lint:          `vale content/`

StylesPath = .vale-styles
MinAlertLevel = suggestion

Packages = proselint, write-good

[*.md]
BasedOnStyles = Vale, proselint, write-good

# Hugo shortcodes/raw HTML — skip block contents.
BlockIgnores = (?s) *({{[%<].*?[%>]}}.*?{{[%<] *\/.*? [%>]}})
TokenIgnores = ({{[%<] ?[^>]+ ?[%>]}})
